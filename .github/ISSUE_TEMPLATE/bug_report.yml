name: Bug report
description: Something is broken or not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
      placeholder: |
        1. I did X
        2. Expected Y
        3. Got Z instead
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 1.0.57
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.4 / Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Attach anything that helps understand the issue.
