name: Desktop CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install OpenClaw deps
        run: cd openclaw && pnpm install --frozen-lockfile

      - name: Build OpenClaw
        run: cd openclaw && pnpm build && pnpm ui:build

      - name: Install Desktop deps
        run: cd desktop && npm ci

      - name: Run Desktop checks
        run: cd desktop && npm run check:ci

      - name: Build Desktop
        run: cd desktop && npm run build:all

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            electron_args: --mac zip
            artifact_name: openspace-release-mac
          - os: windows-latest
            electron_args: --win nsis
            artifact_name: openspace-release-win
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install OpenClaw deps
        run: cd openclaw && pnpm install --frozen-lockfile

      - name: Build OpenClaw
        run: cd openclaw && pnpm build && pnpm ui:build

      - name: Install Desktop deps
        run: cd desktop && npm ci

      - name: Prepare OpenClaw bundle
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          OPENCLAW_BUNDLE_SKIP_ESBUILD: "1"
          OPENCLAW_BUNDLE_SKIP_VERIFY: "1"
        run: cd desktop && npm run prepare:openclaw:ci

      - name: Prepare Node runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd desktop && npm run prepare:node

      - name: Prepare optional runtimes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd desktop
          npm run prepare:gog:all || echo "[warn] gog fetch failed, skipping"
          npm run prepare:jq:all || echo "[warn] jq fetch failed, skipping"
          npm run prepare:memo:all || echo "[warn] memo fetch failed, skipping"
          npm run prepare:remindctl:all || echo "[warn] remindctl fetch failed, skipping"
          npm run prepare:obsidian-cli:all || echo "[warn] obsidian-cli fetch failed, skipping"
          npm run prepare:gh:all || echo "[warn] gh fetch failed, skipping"
          npm run prepare:whisper-cli:all || echo "[warn] whisper-cli fetch failed, skipping"

      - name: Ensure optional runtime directories exist
        run: |
          cd desktop
          node -e "const fs=require('fs');['vendor/gog','vendor/jq','vendor/memo','vendor/remindctl','vendor/obsidian-cli','vendor/gh','vendor/whisper-cli','.gog-runtime/credentials'].forEach((dir)=>fs.mkdirSync(dir,{recursive:true}))"

      - name: Build Desktop
        run: cd desktop && npm run build:all

      - name: Package and publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARYTOOL_PROFILE: ${{ secrets.NOTARYTOOL_PROFILE }}
          NOTARYTOOL_KEY: ${{ secrets.NOTARYTOOL_KEY }}
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER: ${{ secrets.NOTARYTOOL_ISSUER }}
          NOTARIZE: ${{ vars.OPENSPACE_NOTARIZE }}
        run: cd desktop && npx electron-builder ${{ matrix.electron_args }} --publish always

      - name: Upload published artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            desktop/release/*.zip
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/*.yml
          if-no-files-found: warn
