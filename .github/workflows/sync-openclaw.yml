name: Sync OpenClaw Submodule

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Use GitHub API to sync fork with upstream (requires PAT with repo scope)
          gh api -X POST /repos/guilhermexp/openclaw/merge-upstream \
            -f branch=main || echo "Fork already up to date or sync skipped"

      - name: Update OpenClaw submodule
        run: |
          cd openclaw
          git fetch origin main
          git checkout origin/main
          cd ..

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openclaw
          git commit -m "chore: sync openclaw submodule to latest"
          git push
